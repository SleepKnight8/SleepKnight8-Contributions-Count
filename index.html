<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GitHub Public Contributions Count</title>
<style>
  body {
    font-family: Arial, sans-serif;
    padding: 20px;
  }
  h1 {
    margin-bottom: 5px;
  }
  p.note {
    font-size: 14px;
    color: #555;
    margin-bottom: 20px;
  }
  .year-box {
    border: 1px solid #ccc;
    border-radius: 8px;
    padding: 15px;
    margin-bottom: 10px;
    width: 300px;
  }
  .year-title {
    font-size: 18px;
    font-weight: bold;
  }
  .count {
    font-size: 24px;
    color: #0366d6;
  }
</style>
</head>
<body>

<h1>GitHub Public Contributions</h1>
<p class="note">Note: Only public contributions (commits to public repos) are displayed.</p>
<div id="results"></div>

<script>
const username = "SleepKnight8";

const endpoints = {
  2024: "https://github-contributions-api.jogruber.de/v4/SleepKnight8?y=2024",
  2025: "https://github-contributions-api.jogruber.de/v4/SleepKnight8?y=2025",
  2026: "https://github-contributions-api.jogruber.de/v4/SleepKnight8?y=2026"
};

async function getContributions(year, url) {
  try {
    const res = await fetch(url);
    const data = await res.json();

    // API returns { total: { "2024": number } }
    const count = data.total?.[year] ?? 0;

    return count;
  } catch (err) {
    console.error(err);
    return "Error";
  }
}

(async function() {
  for (const year in endpoints) {

    // Add loading UI
    document.getElementById("results").innerHTML += `
      <div class="year-box" id="year-${year}">
        <div class="year-title">${year}</div>
        <div class="count">Loading...</div>
      </div>
    `;

    const count = await getContributions(year, endpoints[year]);

    document.querySelector(`#year-${year} .count`).textContent =
      typeof count === "number"
        ? count.toLocaleString()
        : "Error";
  }
})();
</script>
</body>
</html>
