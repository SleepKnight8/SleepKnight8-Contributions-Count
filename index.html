<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GitHub Contributions Count</title>
<style>
  body {
    font-family: Arial, sans-serif;
    padding: 20px;
  }
  h1 {
    margin-bottom: 10px;
  }
  .year-box {
    border: 1px solid #ccc;
    border-radius: 8px;
    padding: 15px;
    margin-bottom: 10px;
    width: 300px;
  }
  .year-title {
    font-size: 18px;
    font-weight: bold;
  }
  .count {
    font-size: 24px;
    color: #0366d6;
  }
</style>
</head>
<body>

<h1>GitHub Contributions Count</h1>
<div id="results"></div>

<script>
const username = "SleepKnight8";

const years = [2024, 2025, 2026];

async function getContributions(year) {
  const url = `https://github.com/users/${username}/contributions?from=${year}-01-01&to=${year}-12-31`;

  try {
    const response = await fetch(url);
    const text = await response.text();

    // Extract all contribution counts from SVG rectangles
    const matches = [...text.matchAll(/data-count="(\d+)"/g)];

    let total = 0;
    matches.forEach(m => total += parseInt(m[1]));

    return total;
  } catch (err) {
    console.error(err);
    return "Error";
  }
}

(async function() {
  for (const year of years) {
    const count = await getContributions(year);
    document.getElementById("results").innerHTML += `
      <div class="year-box">
        <div class="year-title">${year}</div>
        <div class="count">${count}</div>
      </div>
    `;
  }
})();
</script>

</body>
</html>
